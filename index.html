<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDT Rompin</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="animation.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<!-- HEADER -->
<header id="header">

<div class="header-left">
    <a href="#" class="logo">
        <img src="images/logo3.png">
    </a>
    <div>Pejabat Daerah dan Tanah Rompin</div>
</div>

<div id="menu-toggle">☰</div>
<div id="overlay"></div>

<aside id="mobile-sidebar">
    <ul>
        <li><a href="#utama">Utama</a></li>
        <li><a href="#sec">Maklumat</a></li>
        <li><a href="#perkhidmatan">Perkhidmatan</a></li>
        <li><a href="#pengumuman">Pengumuman</a></li>
        <li><a href="#peta">Peta</a></li>
        <li><a href="#faq">FAQ</a></li>
        <li><a href="#borang">Borang</a></li>
        <li><a href="#footer">Hubungi</a></li>
    </ul>
</aside>

</header>

<!-- PARALLAX -->
<section id="utama">
    <img src="images/land/sky.png" id="sky">
    <img src="images/land/sun.png" id="sun">
    <img src="images/land/mountains.png" id="mountains">
    <img src="images/land/cloud.png" id="cloud">

    <h1 id="text">Selamat Datang</h1>
    <p id="datetime"></p>

    <img src="images/land/waterfall.png" id="forest">
    <img src="images/land/bird1.png" id="bird1">
    <img src="images/land/bird2.png" id="bird2">

    <a href="#sec" id="explore">Masuk</a>
</section>

<!-- CONTENT -->
<section id="sec">
    <h2>Maklumat</h2>
</section>

<section id="perkhidmatan">
    <div class="perkhidmatan-card">Tanah</div>
    <div class="perkhidmatan-card">Pembangunan</div>
</section>

<section id="pengumuman">
    <div class="pengumuman-grid">
        <div class="pengumuman-card">Info 1</div>
        <div class="pengumuman-card">Info 2</div>
    </div>
</section>

<section id="peta">
    <input id="mapSearch" placeholder="Cari lokasi">
    <button onclick="searchLocation()">Cari</button>

    <iframe id="map"
        src="https://www.google.com/maps?q=Rompin&output=embed"></iframe>

    <div id="qrBox"></div>
    <button onclick="generateQR()">QR</button>
</section>

<section id="faq">
    <div class="faq-item">
        <div class="faq-question">Soalan</div>
        <div class="faq-answer">Jawapan</div>
    </div>
</section>

<section id="borang">
    <div id="qrBoxBorang"></div>
    <button onclick="generateBorangQR()">QR Borang</button>
</section>

<section id="footer">
    <h2>Footer</h2>
</section>

<!-- QR LIB -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<!-- JS -->
<script src="action.js"></script>

</body>
</html>
