<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Full Video View</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: black;
      overflow: hidden;
    }

    .video-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: black;

      display: flex;
      justify-content: center;
      align-items: center;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: contain; /* IMPORTANT: shows FULL video */
    }
  </style>
</head>

<body>

  <div class="video-container">
    <video autoplay loop muted playsinline>
      <source src="images/pdtrompin.mp4" type="video/mp4">
    </video>
  </div>

</body>
</html>
